# ============================================================
# WEATHER MINING PROJECT - CONFIGURATION FILE
# Đề tài 5: Dự báo thời tiết (Szeged Hungary 2006-2016)
# ============================================================

# --- Đường dẫn dữ liệu ---
data:
  raw_path: "data/raw/weather_raw.csv"
  processed_dir: "data/processed"
  cleaned_parquet: "data/processed/weather_cleaned.parquet"
  cleaned_csv: "data/processed/weather_cleaned.csv"
  scaled_parquet: "data/processed/weather_scaled.parquet"

# --- Đường dẫn đầu ra ---
outputs:
  figures_dir: "outputs/figures"
  tables_dir: "outputs/tables"
  models_dir: "outputs/models"

# --- Tham số tiền xử lý ---
preprocessing:
  random_seed: 42
  test_size: 0.2
  pressure_zero_replacement: "median"   # Xử lý cột Pressure = 0
  precip_type_fill: "rain"              # Fill NaN Precip Type

# --- Tham số Feature Engineering ---
features:
  temperature_bins:
    labels: ["Low", "Normal", "High"]
    num_bins: 3
  humidity_bins:
    labels: ["Low", "Normal", "High"]
    num_bins: 3
  wind_speed_bins:
    labels: ["Low", "Normal", "High"]
    num_bins: 3
  season_mapping:
    # Tháng -> Mùa (theo khí hậu châu Âu)
    spring: [3, 4, 5]
    summer: [6, 7, 8]
    autumn: [9, 10, 11]
    winter: [12, 1, 2]

# --- Tham số Khai phá Luật kết hợp ---
association:
  min_support: 0.05
  min_confidence: 0.5
  min_lift: 1.0
  top_n_rules: 20
  algorithm: "fpgrowth"    # "apriori" hoặc "fpgrowth"

# --- Tham số Phân cụm ---
clustering:
  k_range: [2, 10]         # Khoảng tìm K tối ưu
  random_seed: 42
  n_init: 10
  max_iter: 300

# --- Tham số Phân loại ---
classification:
  target_column: "Summary"
  test_size: 0.2
  random_seed: 42
  cv_folds: 5
  scoring_metric: "f1_macro"

# --- Tham số Dự báo chuỗi thời gian ---
forecasting:
  target_column: "Temperature (C)"
  train_ratio: 0.8
  arima_order: [5, 1, 2]
  seasonal_order: [1, 1, 1, 12]
  n_lags_acf: 50

# --- Tham số Anomaly Detection (Nhánh thay thế) ---
anomaly_detection:
  contamination: 0.05          # Tỷ lệ anomaly giả định (5%)
  random_seed: 42
  n_neighbors: 20              # Số láng giềng cho LOF
  n_estimators_if: 200         # Số cây cho Isolation Forest